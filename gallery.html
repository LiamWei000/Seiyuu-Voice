<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Seiyuu Voice | Gallery</title>

    <link rel="stylesheet" href="css/style.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link
        href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600&family=Poppins:wght@300;400;500&display=swap"
        rel="stylesheet">

    <style>
        /* ===== ROOT VARIABLES ===== */
        :root {
            --bg-color: #fafafa;
            --card-bg: #ffffff;
            --shadow: 0 8px 18px rgba(0, 0, 0, 0.08);
            --radius: 12px;
            --transition: 0.25s ease;
        }

        /* ===== BASE ===== */
        body {
            font-family: "Poppins", sans-serif;
            margin: 0;
            background: var(--bg-color);
            color: #333;
        }

        .container {
            width: 90%;
            max-width: 1100px;
            margin: auto;
        }

        /* ===== GALLERY PAGE ===== */
        .gallery-page {
            padding: 100px 0;
            text-align: center;
        }

        .gallery-category {
            margin: 60px 0 20px;
            font-family: "Fredoka", sans-serif;
            font-size: 1.8rem;
        }

        /* ===== GRID ===== */
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
        }

        /* ===== CARD ===== */
        .gallery-card {
            cursor: pointer;
            border-radius: var(--radius);
            overflow: hidden;
            background: var(--card-bg);
            box-shadow: var(--shadow);
            transition: transform var(--transition),
                box-shadow var(--transition);
        }

        .gallery-card:hover {
            transform: translateY(-6px);
            box-shadow: 0 12px 25px rgba(0, 0, 0, 0.12);
        }

        .gallery-card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        /* ===== MODAL ===== */
        .media-modal {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.85);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 999;
            padding: 20px;
        }

        .media-modal.active {
            display: flex;
        }

        /* ===== MODAL CONTENT ===== */
        .modal-content {
            position: relative;
            background: #fff;
            padding: 25px;
            border-radius: var(--radius);
            max-width: 800px;
            width: 100%;
            text-align: center;
            animation: fadeIn .25s ease;
        }

        .modal-content img,
        .modal-content video {
            width: 100%;
            max-height: 70vh;
            object-fit: contain;
            border-radius: 10px;
        }

        /* ===== CLOSE BUTTON ===== */
        .close-btn {
            position: absolute;
            top: 20px;
            right: 25px;
            font-size: 28px;
            background: none;
            border: none;
            color: #fff;
            cursor: pointer;
        }

        .close-btn:hover {
            opacity: .7;
        }

        /* ===== TEXT ===== */
        #mediaTitle {
            margin-top: 15px;
            font-weight: 600;
        }

        #mediaDesc {
            opacity: .8;
            font-size: .95rem;
        }

        /* ===== ANIMATION ===== */
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: scale(.95);
            }

            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width:600px) {

            .gallery-page {
                padding: 70px 0;
            }

            .gallery-category {
                font-size: 1.5rem;
            }

        }
    </style>
</head>

<body>

    <header class="navbar">
        <div class="container nav-container">

            <a href="index.html" class="logo">
                <img src="assets/images/logo.png" alt="logo">
                <span>Seiyuu Voice</span>
            </a>

            <nav>
                <ul>
                    <li><a href="index.html">Home</a></li>
                    <li><a href="gallery.html">Gallery</a></li>
                </ul>
            </nav>

        </div>
    </header>


    <main class="gallery-page">

        <div class="container">

            <h1>Seiyuu Voice Gallery</h1>

            <!-- ================= IMAGES ================= -->

            <h2 class="gallery-category">Images</h2>

            <div class="gallery-grid">

                <div class="gallery-card" data-type="image" data-src="assets/gallery/photo1.jpg"
                    data-title="Voice Acting Artwork" data-desc="Artwork from Seiyuu Voice community.">

                    <img src="assets/gallery/photo1.jpg" loading="lazy">
                </div>

                <div class="gallery-card" data-type="image" data-src="assets/gallery/photo2.jpg"
                    data-title="Community Project" data-desc="Illustration created by community members.">

                    <img src="assets/gallery/photo2.jpg" loading="lazy">
                </div>

            </div>


            <!-- ================= VIDEOS ================= -->

            <h2 class="gallery-category">Videos</h2>

            <div class="gallery-grid">

                <div class="gallery-card" data-type="video" data-src="assets/gallery/anime-dub.mp4"
                    data-title="Anime Dub Practice" data-desc="Voice acting practice from Seiyuu Voice.">

                    <img src="assets/gallery/video-thumb.jpg">
                </div>

                <div class="gallery-card" data-type="video" data-src="assets/gallery/voice-demo.mp4"
                    data-title="Anime Dub Practice" data-desc="Voice acting practice from Seiyuu Voice.">

                    <img src="assets/gallery/video-thumb.jpg">
                </div>

            </div>


            <!-- ================= AUDIO ================= -->

            <h2 class="gallery-category">Audio</h2>

            <div class="gallery-grid">

                <div class="gallery-card" data-type="audio" data-src="assets/gallery/voice-sample.mp3"
                    data-title="Voice Sample" data-desc="Voice acting demo from a member.">

                    <img src="assets/images/audio-cover.png">
                </div>

            </div>

        </div>

    </main>


    <!-- ================= MODAL ================= -->

    <div class="media-modal" id="mediaModal">

        <button class="close-btn" id="closeModal">✕</button>

        <div class="modal-content">

            <div id="mediaContainer"></div>

            <h3 id="mediaTitle"></h3>
            <p id="mediaDesc"></p>

        </div>

    </div>


    <script src="js/gallery.js"></script>

    <script>
        const cards = document.querySelectorAll(".gallery-card");
        const modal = document.getElementById("mediaModal");
        const mediaContainer = document.getElementById("mediaContainer");
        const title = document.getElementById("mediaTitle");
        const desc = document.getElementById("mediaDesc");
        const closeBtn = document.getElementById("closeModal");


        cards.forEach(card => {

            card.addEventListener("click", () => {

                const type = card.dataset.type;
                const src = card.dataset.src;
                const mediaTitle = card.dataset.title;
                const mediaDesc = card.dataset.desc;

                mediaContainer.innerHTML = "";

                let mediaElement;

                if (type === "image") {

                    mediaElement = document.createElement("img");
                    mediaElement.src = src;

                }

                if (type === "video") {

                    mediaElement = document.createElement("video");
                    mediaElement.src = src;
                    mediaElement.controls = true;
                    mediaElement.autoplay = true;

                }

                if (type === "audio") {

                    mediaElement = document.createElement("audio");
                    mediaElement.src = src;
                    mediaElement.controls = true;
                    mediaElement.autoplay = true;

                }

                mediaContainer.appendChild(mediaElement);

                title.textContent = mediaTitle;
                desc.textContent = mediaDesc;

                modal.classList.add("active");

            });

        });


        closeBtn.onclick = () => {
            modal.classList.remove("active");
            mediaContainer.innerHTML = "";
        };


        modal.addEventListener("click", (e) => {
            if (e.target === modal) {
                modal.classList.remove("active");
                mediaContainer.innerHTML = "";
            }
        });
    </script>
</body>

</html>

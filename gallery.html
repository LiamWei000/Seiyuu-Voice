<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Seiyuu Voice | Gallery</title>

    <meta name="description"
        content="Gallery of voice acting projects, videos, and music from the Seiyuu Voice community.">

    <link rel="stylesheet" href="css/style.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link
        href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600&family=Poppins:wght@300;400;500&display=swap"
        rel="stylesheet">

    <link rel="icon" href="assets/icons/favicon.png">

    <meta property="og:title" content="Seiyuu Voice Gallery">
    <meta property="og:description" content="Photos, videos, and voice acting works from Seiyuu Voice.">
    <meta property="og:image" content="assets/images/logo.png">
    <meta property="og:type" content="website">

    <style>
        #year {
            font-weight: bold;
        }

        .gallery-page {
            padding: 110px 0 70px;
            text-align: center;
        }

        .gallery-desc {
            max-width: 640px;
            margin: auto;
            margin-bottom: 45px;
            opacity: .85;
        }

        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 22px;
        }

        .gallery-item {
            background: #fff;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 10px 22px rgba(0, 0, 0, 0.08);
            transition: transform .25s ease, box-shadow .25s ease;
            padding: 12px;
        }

        .gallery-item:hover {
            transform: translateY(-5px);
            box-shadow: 0 14px 30px rgba(0, 0, 0, 0.12);
        }

        .gallery-item img,
        .gallery-item video {
            width: 100%;
            height: auto;
            border-radius: 12px;
            display: block;
        }

        .gallery-item video {
            aspect-ratio: 16/9;
            object-fit: cover;
        }

        .music-card {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 25px;
            gap: 10px;
        }

        .music-card h3 {
            font-size: 1rem;
            font-weight: 600;
        }

        .gallery-cta {
            margin-top: 50px;
        }

        .gallery-cta p {
            margin-bottom: 12px;
            opacity: .9;
        }
    </style>

</head>

<body>

    <header class="navbar">
        <div class="container nav-container">

            <a href="index.html" class="logo">
                <img src="assets/images/logo.png" alt="Seiyuu Voice Logo">
                <span>Seiyuu Voice</span>
            </a>

            <nav id="nav-menu" aria-label="Main Navigation">
                <ul>
                    <li><a href="index.html#home">Home</a></li>
                    <li><a href="index.html#about">About</a></li>
                    <li><a href="index.html#join">Join</a></li>
                    <li><a href="gallery.html" aria-current="page">Gallery</a></li>
                </ul>
            </nav>

            <button class="menu-toggle" id="menu-toggle" aria-label="Toggle navigation menu" aria-expanded="false">
                <span></span>
                <span></span>
                <span></span>
            </button>

        </div>
    </header>

    <main>

        <section class="gallery-page">

            <div class="container">

                <h1>Seiyuu Voice Gallery</h1>

                <p class="gallery-desc">
                    Explore photos, videos, and voice acting works created by members of the Seiyuu Voice community.
                </p>

                <div class="gallery-grid">

                    <!-- IMAGE -->
                    <figure class="gallery-item">
                        <img src="assets/gallery/photo1.jpg" alt="Voice acting project artwork" loading="lazy">
                    </figure>

                    <!-- IMAGE -->
                    <figure class="gallery-item">
                        <img src="assets/gallery/photo2.jpg" alt="Anime community artwork" loading="lazy">
                    </figure>

                    <!-- VIDEO -->
                    <figure class="gallery-item">
                        <video controls preload="metadata">
                            <source src="assets/gallery/voice-demo.mp4" type="video/mp4">
                            Your browser does not support the video tag.
                        </video>
                    </figure>

                    <!-- VIDEO -->
                    <figure class="gallery-item">
                        <video controls preload="metadata">
                            <source src="assets/gallery/anime-dub.mp4" type="video/mp4">
                        </video>
                    </figure>

                    <!-- AUDIO -->
                    <figure class="gallery-item music-card">

                        <h3>Voice Acting Sample</h3>

                        <audio controls preload="none">
                            <source src="assets/gallery/voice-sample.mp3" type="audio/mpeg">
                            Your browser does not support the audio element.
                        </audio>

                    </figure>

                    <!-- AUDIO -->
                    <figure class="gallery-item music-card">

                        <h3>Community Song</h3>

                        <audio controls preload="none">
                            <source src="assets/gallery/community-theme.mp3" type="audio/mpeg">
                        </audio>

                    </figure>

                </div>

                <div class="gallery-cta">

                    <p>Want your work featured here?</p>

                    <a href="https://chat.whatsapp.com/L0AVT6RCDSt1fvbVVtorko?mode=hq2tcla" class="cta-big"
                        target="_blank" rel="noopener noreferrer">
                        Join the Community
                    </a>

                </div>

            </div>

        </section>

    </main>

    <footer>
        <div class="container">
            <p>© <span id="year"></span> Seiyuu Voice Community</p>
        </div>
    </footer>

    <script src="js/script.js"></script>

    <script>
        document.getElementById("year").textContent =
            new Date().getFullYear();
    </script>

</body>

</html>
